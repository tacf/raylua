name: Build and Release

on:
  push:
    branches: [master, main]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      suffix: ${{ steps.meta.outputs.suffix }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      make_latest: ${{ steps.meta.outputs.make_latest }}

    steps:
      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            SUFFIX="${GITHUB_REF_NAME}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
            RELEASE_NAME="${GITHUB_REF_NAME}"
            PRERELEASE=false
            MAKE_LATEST=true
          else
            CALVER="$(date -u +%Y.%m.%d)"
            SUFFIX="${CALVER}-dev.${GITHUB_RUN_NUMBER}"
            RELEASE_TAG="${SUFFIX}"
            RELEASE_NAME="${SUFFIX}"
            PRERELEASE=true
            MAKE_LATEST=false
          fi

          echo "suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "make_latest=${MAKE_LATEST}" >> "$GITHUB_OUTPUT"

  validate-generated:
    runs-on: ubuntu-latest
    needs: meta

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libxcursor-dev \
            libxinerama-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Build rlparser
        run: make -C raylib/tools/rlparser rlparser

      - name: Regenerate bindings and autocomplete
        run: make update

      - name: Verify generated files are committed
        run: git diff --exit-code -- tools autocomplete/api

  build-linux:
    runs-on: ubuntu-latest
    needs: [meta, validate-generated]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libxcursor-dev \
            libxinerama-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Build package
        run: make package

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release
          ASSET="raylua-linux-x64-${{ needs.meta.outputs.suffix }}"
          tar -C dist -czf "release/${ASSET}.tar.gz" .

      - name: Upload executables only
        uses: actions/upload-artifact@v6
        with:
          name: executables-linux-x64-${{ needs.meta.outputs.suffix }}
          path: dist/*

      - name: Upload packaged archive
        uses: actions/upload-artifact@v6
        with:
          name: package-linux-x64-${{ needs.meta.outputs.suffix }}
          path: release/*.tar.gz

  build-macos:
    runs-on: ${{ matrix.runner }}
    needs: [meta, validate-generated]

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            platform: macos-arm64
          - runner: macos-26-intel
            platform: macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build package
        run: make package

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release
          ASSET="raylua-${{ matrix.platform }}-${{ needs.meta.outputs.suffix }}"
          tar -C dist -czf "release/${ASSET}.tar.gz" .

      - name: Upload executables only
        uses: actions/upload-artifact@v6
        with:
          name: executables-${{ matrix.platform }}-${{ needs.meta.outputs.suffix }}
          path: dist/*

      - name: Upload packaged archive
        uses: actions/upload-artifact@v6
        with:
          name: package-${{ matrix.platform }}-${{ needs.meta.outputs.suffix }}
          path: release/*.tar.gz

  build-windows:
    runs-on: windows-latest
    needs: [meta, validate-generated]

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Build package
        run: make package

      - name: Create release archive
        run: |
          mkdir -p release
          ASSET="raylua-windows-x64-${{ needs.meta.outputs.suffix }}"
          cd dist
          zip -9 -r "../release/${ASSET}.zip" .

      - name: Upload executables only
        uses: actions/upload-artifact@v6
        with:
          name: executables-windows-x64-${{ needs.meta.outputs.suffix }}
          path: dist/*

      - name: Upload packaged archive
        uses: actions/upload-artifact@v6
        with:
          name: package-windows-x64-${{ needs.meta.outputs.suffix }}
          path: release/*.zip

  release:
    runs-on: ubuntu-latest
    needs: [meta, build-linux, build-macos, build-windows]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: builds

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find builds -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.meta.outputs.release_name }}
          draft: false
          prerelease: ${{ needs.meta.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.meta.outputs.make_latest }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}