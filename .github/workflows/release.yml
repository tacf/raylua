name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      raylib_ver: ${{ steps.check.outputs.raylib_ver }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 2

      - name: Check for changes
        id: check
        run: |
          set -euo pipefail

          RAYLIB_VER=$(grep '#define RAYLIB_VERSION ' raylib/src/raylib.h | sed 's/.*"\(.*\)"/\1/')
          echo "raylib_ver=$RAYLIB_VER" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Manual run requested"
            exit 0
          fi

          if git rev-parse HEAD~1 >/dev/null 2>&1 && git diff --name-only HEAD~1 HEAD | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Code changes detected"
          elif git submodule status --recursive | grep -q "^[+-]"; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Submodule changes detected"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected, skipping build"
          fi

  version:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version_prefix: ${{ steps.version.outputs.version_prefix }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TZ: Europe/Lisbon
        run: |
          set -euo pipefail

          DATE=$(date +%Y%m%d)
          EXISTING_TAGS=$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --jq '.[].tag_name' 2>/dev/null || true
          )

          MAX_SEQ=$(
            printf '%s\n' "$EXISTING_TAGS" \
              | sed -n "s/^raylua-${DATE}-dev\.\([0-9][0-9]*\)$/\1/p" \
              | sort -n \
              | tail -n1
          )

          if [ -z "${MAX_SEQ:-}" ]; then
            SEQ=1
          else
            SEQ=$((MAX_SEQ + 1))
          fi

          VERSION_PREFIX="${DATE}-dev.${SEQ}"
          TAG_NAME="raylua-${VERSION_PREFIX}"

          echo "version_prefix=$VERSION_PREFIX" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          echo "Version prefix: $VERSION_PREFIX"
          echo "Tag: $TAG_NAME"

  validate-generated:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libxcursor-dev \
            libxinerama-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Build rlparser
        run: make -C raylib/tools/rlparser rlparser

      - name: Regenerate bindings and autocomplete
        run: make update

      - name: Verify generated files are committed
        run: git diff --exit-code -- tools autocomplete/api

  build-linux:
    needs: [check-changes, version, validate-generated]
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libxcursor-dev \
            libxinerama-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Build package
        run: make package

      - name: Stage binaries and bundle
        run: |
          set -euo pipefail

          mkdir -p release-bin package
          test -f dist/raylua
          test -f dist/rayluac

          cp dist/raylua release-bin/
          cp dist/rayluac release-bin/

          tar -C release-bin -czf package/raylua-linux-x64.tar.gz raylua rayluac

          ls -la dist
          ls -la release-bin
          ls -la package

      - name: Upload executables
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.version.outputs.version_prefix }}-raylib-lua-linux-x64
          path: release-bin/*
          if-no-files-found: error

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.version.outputs.version_prefix }}-raylua-linux
          path: package/raylua-linux-x64.tar.gz
          if-no-files-found: error

  build-macos:
    needs: [check-changes, version, validate-generated]
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            exec_artifact_name: raylib-lua-macos-arm64
            package_artifact_name: raylua-macos-arm64
            platform_label: macos-arm64
          - runner: macos-26-intel
            exec_artifact_name: raylib-lua-macos-x64
            package_artifact_name: raylua-macos-x64
            platform_label: macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build package
        run: make package

      - name: Stage binaries and bundle
        run: |
          set -euo pipefail

          mkdir -p release-bin package
          test -f dist/raylua
          test -f dist/rayluac

          cp dist/raylua release-bin/
          cp dist/rayluac release-bin/

          tar -C release-bin -czf "package/raylua-${{ matrix.platform_label }}.tar.gz" raylua rayluac

          ls -la dist
          ls -la release-bin
          ls -la package

      - name: Upload executables
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.version.outputs.version_prefix }}-${{ matrix.exec_artifact_name }}
          path: release-bin/*
          if-no-files-found: error

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.version.outputs.version_prefix }}-${{ matrix.package_artifact_name }}
          path: package/raylua-${{ matrix.platform_label }}.tar.gz
          if-no-files-found: error

  build-windows:
    needs: [check-changes, version, validate-generated]
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Build package
        run: make package

      - name: Stage binaries and bundle
        run: |
          set -euo pipefail

          mkdir -p release-bin package

          if [ -f dist/raylua.exe ]; then
            cp dist/raylua.exe release-bin/
            RAYLUA_BIN="raylua.exe"
          else
            cp dist/raylua release-bin/
            RAYLUA_BIN="raylua"
          fi

          if [ -f dist/rayluac.exe ]; then
            cp dist/rayluac.exe release-bin/
            RAYLUAC_BIN="rayluac.exe"
          else
            cp dist/rayluac release-bin/
            RAYLUAC_BIN="rayluac"
          fi

          (
            cd release-bin
            zip -9 "../package/raylua-windows-x64.zip" "$RAYLUA_BIN" "$RAYLUAC_BIN"
          )

          ls -la dist
          ls -la release-bin
          ls -la package

      - name: Upload executables
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.version.outputs.version_prefix }}-raylib-lua-windows-x64
          path: release-bin/*
          if-no-files-found: error

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.version.outputs.version_prefix }}-raylua-windows
          path: package/raylua-windows-x64.zip
          if-no-files-found: error

  release:
    needs: [check-changes, version, build-linux, build-macos, build-windows]
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Show downloaded files
        run: find builds -maxdepth 3 -type f | sort

      - name: Prepare release assets
        env:
          VERSION_PREFIX: ${{ needs.version.outputs.version_prefix }}
          TAG_NAME: ${{ needs.version.outputs.tag_name }}
        run: |
          set -euo pipefail

          mkdir -p release-assets

          cp "builds/${VERSION_PREFIX}-raylua-linux/raylua-linux-x64.tar.gz" \
             "release-assets/${TAG_NAME}-raylua-linux-x64.tar.gz"

          cp "builds/${VERSION_PREFIX}-raylua-macos-arm64/raylua-macos-arm64.tar.gz" \
             "release-assets/${TAG_NAME}-raylua-macos-arm64.tar.gz"

          cp "builds/${VERSION_PREFIX}-raylua-macos-x64/raylua-macos-x64.tar.gz" \
             "release-assets/${TAG_NAME}-raylua-macos-x64.tar.gz"

          cp "builds/${VERSION_PREFIX}-raylua-windows/raylua-windows-x64.zip" \
             "release-assets/${TAG_NAME}-raylua-windows-x64.zip"

          ls -la release-assets

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.version.outputs.release_name }}
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/${{ needs.version.outputs.tag_name }}-raylua-linux-x64.tar.gz
            release-assets/${{ needs.version.outputs.tag_name }}-raylua-macos-arm64.tar.gz
            release-assets/${{ needs.version.outputs.tag_name }}-raylua-macos-x64.tar.gz
            release-assets/${{ needs.version.outputs.tag_name }}-raylua-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}