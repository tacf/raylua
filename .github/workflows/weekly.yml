name: Weekly Dependencies Update Check

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libxcursor-dev \
            libxinerama-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --remote --merge raylib raygui physac

      - name: Build rlparser
        run: make -C raylib/tools/rlparser rlparser

      - name: Regenerate bindings and autocomplete
        run: make update

      - name: Check for generated-file changes
        id: changes
        run: |
          if git diff --quiet -- tools autocomplete/api raylib raygui physac; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update dependencies and generated files"
          title: "chore: weekly dependencies update (auto-generated)"
          body: |
            This PR was automatically created by the weekly dependencies update workflow.

            Included changes:
            - updated submodules (`raylib`, `raygui`, `physac`) when upstream moved
            - regenerated binding snapshots in `tools/`
            - regenerated autocomplete API files in `autocomplete/api/`

            Checklist:
            - [ ] Verify generated bindings look correct
            - [ ] Verify autocomplete output looks correct
            - [ ] Confirm the build passes on all platforms
            - [ ] Review any upstream API changes
          branch: chore/weekly-deps-update
          base: ${{ github.event.repository.default_branch }}
          labels: |
            auto-generated
            needs-review

      - name: No changes message
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "No dependency or generated-file changes detected."
